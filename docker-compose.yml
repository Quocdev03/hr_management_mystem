version: "3.8"

# Docker Compose cho HRM API
# Services: app, mysql

services:
    # MySQL Database
    mysql:
        image: mysql:8.0
        container_name: hrm_mysql
        restart: unless-stopped
        environment:
            MYSQL_ROOT_PASSWORD: password123
            MYSQL_DATABASE: hrm_db
            MYSQL_USER: hrm_user
            MYSQL_PASSWORD: password123
        ports:
            - "3306:3306"
        volumes:
            - mysql_data:/var/lib/mysql
        networks:
            - hrm_network
        healthcheck:
            test:
                [
                    "CMD",
                    "mysqladmin",
                    "ping",
                    "-h",
                    "localhost",
                    "-u",
                    "root",
                    "-ppassword123",
                ]
            interval: 10s
            timeout: 5s
            retries: 5


# Volumes
volumes:
    mysql_data:
        driver: local

# Networks
networks:
    hrm_network:
        driver: bridge
