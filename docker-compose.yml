version: "3.8"

# Docker Compose cho HRM API
# Services: app, mysql

services:
   # MySQL Database
   mysql:
      image: mysql:8.0
      container_name: hrm_mysql
      restart: unless-stopped
      environment:
         MYSQL_ROOT_PASSWORD: password123
         MYSQL_DATABASE: hrm_db
         MYSQL_USER: hrm_user
         MYSQL_PASSWORD: password123
      ports:
         - "3306:3306"
      volumes:
         - mysql_data:/var/lib/mysql
      networks:
         - hrm_network
      healthcheck:
         test:
            [
               "CMD",
               "mysqladmin",
               "ping",
               "-h",
               "localhost",
               "-u",
               "root",
               "-ppassword123",
            ]
         interval: 10s
         timeout: 5s
         retries: 5

   # Redis Cache
   redis:
      image: redis:7.2-alpine
      container_name: hrm_redis
      restart: unless-stopped
      ports:
         - "6379:6379"
      volumes:
         - redis_data:/data
      networks:
         - hrm_network
      healthcheck:
         test: ["CMD", "redis-cli", "ping"]
         interval: 10s
         timeout: 5s
         retries: 5

   # Backend (Go API)
   backend:
      build:
         context: ./backend
         dockerfile: Dockerfile
      container_name: hrm_backend
      restart: unless-stopped
      ports:
         - "8080:8080"
      environment:
         - APP_PORT=8080
         - APP_ENV=production
         - DB_HOST=mysql
         - DB_PORT=3306
         - DB_USER=root
         - DB_PASSWORD=password123
         - DB_NAME=hrm_db
         - JWT_SECRET=your_jwt_secret_key
         - JWT_EXPIRE_HOUR=1
         - REFRESH_EXPIRE_DAY=7
         - REDIS_HOST=redis
         - REDIS_PORT=6379
         - REDIS_PASSWORD=
         - REDIS_DB=0
         - APP_SEED=true
      depends_on:
         mysql:
            condition: service_healthy
         redis:
            condition: service_healthy
      networks:
         - hrm_network

   # Frontend (Vue 3 + Nginx Reverse Proxy)
   frontend:
      build:
         context: ./frontend
         dockerfile: Dockerfile
      container_name: hrm_frontend
      restart: unless-stopped
      ports:
         - "80:80"
      depends_on:
         - backend
      networks:
         - hrm_network

# Volumes
volumes:
   mysql_data:
      driver: local
   redis_data:
      driver: local

# Networks
networks:
   hrm_network:
      driver: bridge
