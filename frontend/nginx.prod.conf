# ═══════════════════════════════════════════════════════════════════════════
# Production Nginx Configuration with HTTPS/TLS
# ═══════════════════════════════════════════════════════════════════════════
# Usage: Copy this to nginx.conf when deploying to production
# Includes: SSL/TLS, Security Headers, OWASP compliance

# ═══════════════════════════════════════════════════════════════════════════
# HTTP Server - Redirect all traffic to HTTPS
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name _;
    
    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

# ═══════════════════════════════════════════════════════════════════════════
# HTTPS Server - Main Application Server with Security Hardening
# ═══════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name _;

    # ─── SSL/TLS Configuration ──────────────────────────────────────────
    # Place certificate files in /etc/nginx/certs/ directory
    # For Let's Encrypt: /etc/letsencrypt/live/yourdomain.com/
    # For self-signed: Run scripts/generate-certs.sh
    ssl_certificate /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # SSL Protocol & Cipher Configuration (Strong Security - Grade A+)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # ─── Security Headers (OWASP Top 10 Protection) ──────────────────────
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Prevent clickjacking attacks
    add_header X-Frame-Options "DENY" always;
    
    # Enable XSS Protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Enforce HTTPS for all future requests (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Restrict features and APIs (Permissions Policy)
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ─── Logging ─────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # ─── Serve Vue Frontend SPA ──────────────────────────────────────────
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
        
        # Cache static assets aggressively in production
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── Reverse proxy API requests to Backend ───────────────────────────
    location /api/v1/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers for backend
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        # Timeout settings for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering settings
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        
        # Cache bypass for upgrades
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint for load balancers
    location /health {
        proxy_pass http://backend:8080/api/v1/health;
        access_log off;
    }

    # ─── Error Pages ────────────────────────────────────────────────────
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
